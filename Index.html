<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradesitePro — Preview Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Instrument Sans', sans-serif;
      background: #0e0e0e; color: #f5f2ec;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
      text-align: center;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem; letter-spacing: 0.05em; margin-bottom: 1rem;
    }
    .logo span { color: #e8500a; }
    p { color: #666; font-size: 0.9rem; line-height: 1.7; max-width: 360px; }
    .badge {
      margin-top: 2rem; background: #1a1a1a; border: 1px solid #333;
      border-radius: 6px; padding: 1rem 1.5rem; font-size: 0.8rem; color: #555;
    }
  </style>
</head>
<body>
  <div class="logo">Tradesite<span>Pro</span></div>
  <p>This is a private client preview portal. If you received a preview link, please use the full URL you were given.</p>
  <div class="badge">tradesitepro.com · Seminole County, FL</div>
</body>
</html>
